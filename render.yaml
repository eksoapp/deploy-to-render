# Ekso self-host on Render
#
# Provisions one managed Postgres 18 (with pgvector), one web service for the
# API, and one background worker. Operator brings their own S3-compatible
# bucket (R2 / AWS S3 / B2 / MinIO) — Render disks can't be shared between
# web + worker, so attachment storage must live in object storage.
#
# Deploy:
#   1. Push this file to a GitHub repo you own.
#   2. In Render: New + → Blueprint → connect the repo.
#   3. Fill in the bucket fields when prompted (Storage__S3*).
#   4. First boot ~2 minutes; check https://<your-api>.onrender.com/startup
#      for HTTP 200, then complete the first-run wizard at /startup.
#
# Live docs: https://ekso.dev/guide/install/render

databases:
    - name: ekso-db
      # basic-1gb is Render's sweet-spot Postgres tier for a typical Ekso
      # install (post-2025 'starter' rename). Includes daily automatic backups
      # — matches the durability story in /guide/manage/data-management.
      # Trade-off vs Pro: no point-in-time recovery (Pro-only feature). Bump
      # to basic-4gb if your working set outgrows 1 GB, or pro-4gb+ if you
      # need PITR. Free tier is unsuitable as default — no backups, suspends
      # after 30 days inactivity.
      plan: basic-1gb
      databaseName: ekso
      user: ekso
      postgresMajorVersion: "18"
      # No external IPs by default — web + worker reach the DB over Render's
      # internal network using the in-workspace credential injection below.
      ipAllowList: []

services:
    # API + Vue SPA host. Public HTTPS endpoint, port auto-detected from the
    # Dockerfile's EXPOSE 6050.
    - type: web
      name: ekso-api
      runtime: image
      plan: starter
      region: oregon
      image:
          url: docker.io/eksoapp/app:latest
      healthCheckPath: /startup

      # No dockerCommand override — Dockerfile's ENTRYPOINT ["dotnet",
      # "Ekso.Endpoint.dll"] runs directly. Backend's Program.cs makes
      # ekso.json OPTIONAL (since 1.X), so all config flows from env vars
      # and there's no shell wrapper to worry about. Render's dockerCommand
      # templating eats POSIX param expansion, shell-runtime vars, and
      # double-wrapped quoting in different ways — bypassing it entirely
      # is the only durably-correct shape for image-based services.

      envVars:
          - fromGroup: ekso-config
          # Tell Render to route HTTP to port 6050 — the port the eksoapp/app
          # Dockerfile EXPOSEs and ASPNETCORE_URLS binds to. Render's
          # auto-detect-from-EXPOSE works in some cases but defaults to
          # PORT=10000 when ambiguous; setting PORT explicitly removes the
          # guesswork. Health check on /startup then probes the right port
          # and the app responds 200 instead of timing out.
          - key: PORT
            value: "6050"
          # Both Transact and Mart point at the same database — Render only
          # provisions one DB resource. Npgsql parses the postgresql:// URL
          # form directly (v6.0+); no shell-side reformatting needed.
          - key: Database__PostgresTransactConnection
            fromDatabase:
                name: ekso-db
                property: connectionString
          - key: Database__PostgresMartConnection
            fromDatabase:
                name: ekso-db
                property: connectionString
          # sync:false envvars must live at SERVICE level — Render silently
          # drops them when declared inside an envVarGroup, so they wouldn't
          # surface in the dashboard for the operator to fill. Duplicated
          # across api+worker because Render env groups don't support
          # operator-must-set secrets. Operator fills these on each service's
          # Environment tab after first sync.
          - key: Storage__S3Bucket
            sync: false
          - key: Storage__S3Endpoint
            sync: false
          - key: Storage__S3AccessKey
            sync: false
          - key: Storage__S3SecretKey
            sync: false

    # Background worker — claims rows from d_queue and dispatches embedding /
    # email work. No HTTP surface, no health check.
    - type: worker
      name: ekso-worker
      runtime: image
      plan: starter
      region: oregon
      image:
          url: docker.io/eksoapp/worker:latest

      # No dockerCommand override — see ekso-api block above for rationale.
      # Dockerfile's ENTRYPOINT ["dotnet", "Ekso.Worker.dll"] runs directly.

      envVars:
          - fromGroup: ekso-config
          - key: Database__PostgresTransactConnection
            fromDatabase:
                name: ekso-db
                property: connectionString
          - key: Database__PostgresMartConnection
            fromDatabase:
                name: ekso-db
                property: connectionString
          # Same sync:false S3 envvars as ekso-api — see comment above.
          # Operator fills these on the worker's Environment tab too; same
          # values as on api (both services hit the same bucket).
          - key: Storage__S3Bucket
            sync: false
          - key: Storage__S3Endpoint
            sync: false
          - key: Storage__S3AccessKey
            sync: false
          - key: Storage__S3SecretKey
            sync: false

# Shared environment shared between api + worker. Anything that's literal, an
# operator-supplied secret, or auto-generated lives here. fromDatabase refs
# don't belong in groups — they're per-service and stay above.
envVarGroups:
    - name: ekso-config
      envVars:
          # ── Auth ───────────────────────────────────────────────────────
          # Render mints a fresh 256-bit base64 string at first deploy.
          # Comfortably above the 32-char floor required by the JWT signer.
          - key: Auth__Jwt__Key
            generateValue: true
          - key: Auth__Jwt__Issuer
            value: Ekso
          - key: Auth__Jwt__Audience
            value: Ekso

          # ── Misc ───────────────────────────────────────────────────────
          - key: Misc__Mode
            value: selfhost
          # Optional: paste a Resend API key after deploy if you want
          # transactional email via Resend. Leaving blank falls back to
          # SMTP, then to log-and-skip. Same for Sentry DSN.
          - key: Misc__Resend
            value: ""
          - key: Misc__Sentry
            value: ""

          # ── Database (provider only; conn string composed in dockerCommand) ──
          - key: Database__Provider
            value: Postgres
          - key: Database__Timeout
            value: "300"
          - key: Database__PostgresAutoPrepare
            value: "false"

          # ── Storage (S3-compatible — bucket details prompted at deploy) ──
          - key: Storage__Provider
            value: S3
          - key: Storage__S3Region
            # Default for Cloudflare R2. Override to "us-east-1" (AWS),
            # "us-west-002" (B2), etc. when prompted.
            value: auto
          - key: Storage__S3ForcePathStyle
            # false for AWS / R2 / B2; true for MinIO and most self-hosted
            # S3 stacks. String-quoted because Render env vars are strings.
            value: "false"
          # NB: Storage__S3Bucket / S3Endpoint / S3AccessKey / S3SecretKey
          # are NOT in this group — Render silently drops sync:false envvars
          # from groups, so they wouldn't surface in the dashboard for the
          # operator to fill. They live on each service's envVars list above.
